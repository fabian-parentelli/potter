<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">

    <!-- css -->
    <link rel="stylesheet" href="../css/style.css">

    <title>Registro Potter</title>
</head>

<body>
    <!-- Navegador -->
    <nav>
        <img class="imgNav" id="logoBase" src="../assets/logo.png" alt="logoPotter">
        <div class="navRight">
            <div id="onOff"></div>
            <div class="cartContainerImg">
                <div id="imgCart"></div>
                <p id="contImgCart">0</p>
            </div>
        </div>
    </nav>

    <header>
        <h1 class="titleRegister">Registro</h1>

        <form id="formRegister">
            <div>
                <label for="name">Nombre</label>
                <input type="text" name="name" placeholder="Este campo debe ser completado" required>
            </div>

            <div>
                <label for="address">Direccion</label>
                <input type="text" name="address">
            </div>
            <div>
                <label for="phone">Teléfono</label>
                <input type="text" name="phone" placeholder="Este campo debe ser completado" required>
            </div>

            <div class="radial">
                <label for="type">Minorista</label>
                <input type="radio" name="type" value="small" checked>

                <label for="type">Mayorista</label>
                <input type="radio" name="type" value="big">
            </div>

            <div>
                <label for="password">Contraseña</label>
                <input type="text" name="password" placeholder="Este campo debe ser completado" required>
            </div>

            <input class="btnRegister" type="submit" value="registrar">
        </form>
    </header>

    <main>
        <section class="modalRegister">
            <div class="modal_container">
                <h3>Tu registro se ha realizado con éxito...</h3>
                <img src="../assets/check.png" alt="check">
                <div class="spinnerRegister">
                    <div class="bounce1"></div>
                    <div class="bounce2"></div>
                    <div class="bounce3"></div>
                </div>
                <p>Volvemos a la página de inicio</p>
            </div>
        </section>
    </main>

    <script src="../javaScript/registerPage/registerPage.js"></script>
</body>
</html>
